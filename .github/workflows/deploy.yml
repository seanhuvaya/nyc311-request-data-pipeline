name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (just to trigger the workflow)
        uses: actions/checkout@v4

      - name: Deploy via SSH (Git Pull + Docker Compose)
        uses: appleboy/ssh-action@v1.3.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            echo "🚀 Starting deployment at $(date)"

            # Go to your project directory
            cd ~/nyc311-request-data-pipeline

            # Fetch latest changes
            echo "📥 Pulling latest code from GitHub..."
            git fetch --all
            git reset --hard origin/main
            git clean -fd   # Remove untracked files/folders if any

            # Deploy with Docker Compose
            echo "🐳 Rebuilding and starting containers..."
            docker compose pull --quiet || true
            docker compose down --remove-orphans || true
            docker compose up -d --build --force-recreate

            echo "✅ Deployment completed successfully at $(date)"
            echo "📊 Container status:"
            docker compose ps