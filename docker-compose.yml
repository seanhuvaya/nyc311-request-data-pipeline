x-common-env: &common-env
  DB_NAME: ${DB_NAME:-nyc311}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DATASET_URL: ${DATASET_URL:-https://data.cityofnewyork.us/resource/erm2-nwe9.csv}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-changemeuser}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-changemepass}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME:-nyc311}
  AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
  AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-pass1234}
  AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-admin}
  AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-admin}
  AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@airflow.com}
  AIRFLOW_HOME: /opt/airflow
  PYTHONPATH: /opt/airflow
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/airflow

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      <<: *common-env
      POSTGRES_DB: ${DB_NAME:-nyc311}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pipeline/sql:/docker-entrypoint-initdb.d

  airflow-init:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: airflow-init
    depends_on:
      - postgres
    volumes:
      - ./pipeline:/opt/airflow
    environment:
      <<: *common-env
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --role Admin --email ${AIRFLOW_ADMIN_EMAIL}
      "

  airflow-api-server:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: airflow-api-server
    depends_on:
      - postgres
      - airflow-init
    ports:
      - "8080:8080"
    volumes:
      - ./pipeline:/opt/airflow
    environment:
      <<: *common-env
    command: airflow api-server --port 8080

  airflow-scheduler:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    depends_on:
      - postgres
      - airflow-init
    volumes:
      - ./pipeline:/opt/airflow
    environment:
      <<: *common-env
    command: airflow scheduler

  airflow-dag-processor:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: airflow-dag-processor
    depends_on:
      - postgres
      - airflow-init
    volumes:
      - ./pipeline:/opt/airflow
    environment:
      <<: *common-env
    command: airflow dag-processor

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - data_minio:/data
    command: [ "server", "/data", "--console-address", ":9001" ]

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    environment:
      <<: *common-env
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc ready local;
      mc mb -p local/${S3_BUCKET_NAME} || true;
      mc ls local;
      "

volumes:
  postgres_data:
  data_minio: