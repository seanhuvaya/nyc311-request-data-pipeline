<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sky background -->
  <rect width="64" height="64" fill="#1a1a2e"/>
  <!-- Moon -->
  <circle cx="52" cy="12" r="6" fill="#e2e8f0" opacity="0.9"/>
  <!-- Skyline buildings -->
  <!-- Far left low building -->
  <rect x="0" y="44" width="8" height="20" fill="#2d3561"/>
  <!-- Windows -->
  <rect x="2" y="46" width="2" height="2" fill="#ffd700" opacity="0.8"/>
  <rect x="5" y="46" width="2" height="2" fill="#ffd700" opacity="0.5"/>
  <rect x="2" y="50" width="2" height="2" fill="#ffd700" opacity="0.9"/>

  <!-- Left tower tall -->
  <rect x="8" y="32" width="10" height="32" fill="#2d3561"/>
  <!-- Antenna -->
  <rect x="12" y="26" width="2" height="6" fill="#4a5568"/>
  <!-- Windows -->
  <rect x="10" y="34" width="2" height="2" fill="#ffd700" opacity="0.9"/>
  <rect x="14" y="34" width="2" height="2" fill="#ffd700" opacity="0.6"/>
  <rect x="10" y="38" width="2" height="2" fill="#ffd700" opacity="0.7"/>
  <rect x="14" y="38" width="2" height="2" fill="#ffd700" opacity="0.9"/>
  <rect x="10" y="42" width="2" height="2" fill="#ffd700" opacity="0.5"/>
  <rect x="14" y="42" width="2" height="2" fill="#ffd700" opacity="0.8"/>

  <!-- Center-left medium building -->
  <rect x="18" y="40" width="8" height="24" fill="#1e3a5f"/>
  <rect x="20" y="42" width="2" height="2" fill="#ffd700" opacity="0.8"/>
  <rect x="23" y="42" width="2" height="2" fill="#ffd700" opacity="0.4"/>
  <rect x="20" y="46" width="2" height="2" fill="#ffd700" opacity="0.9"/>
  <rect x="23" y="46" width="2" height="2" fill="#ffd700" opacity="0.7"/>

  <!-- Empire State Building (center) -->
  <rect x="26" y="20" width="12" height="44" fill="#2d3561"/>
  <!-- Stepped top -->
  <rect x="28" y="14" width="8" height="6" fill="#2d3561"/>
  <rect x="30" y="10" width="4" height="4" fill="#2d3561"/>
  <!-- Spire -->
  <rect x="31" y="4" width="2" height="6" fill="#4a5568"/>
  <!-- Light at top -->
  <circle cx="32" cy="4" r="1.5" fill="#ffd700" opacity="0.9"/>
  <!-- Windows -->
  <rect x="28" y="22" width="2" height="2" fill="#ffd700" opacity="0.9"/>
  <rect x="32" y="22" width="2" height="2" fill="#ffd700" opacity="0.7"/>
  <rect x="28" y="26" width="2" height="2" fill="#ffd700" opacity="0.6"/>
  <rect x="32" y="26" width="2" height="2" fill="#ffd700" opacity="0.9"/>
  <rect x="28" y="30" width="2" height="2" fill="#ffd700" opacity="0.8"/>
  <rect x="32" y="30" width="2" height="2" fill="#ffd700" opacity="0.5"/>
  <rect x="28" y="34" width="2" height="2" fill="#ffd700" opacity="0.9"/>
  <rect x="32" y="34" width="2" height="2" fill="#ffd700" opacity="0.7"/>

  <!-- Right-center building -->
  <rect x="38" y="36" width="10" height="28" fill="#1e3a5f"/>
  <rect x="40" y="38" width="2" height="2" fill="#ffd700" opacity="0.7"/>
  <rect x="44" y="38" width="2" height="2" fill="#ffd700" opacity="0.9"/>
  <rect x="40" y="42" width="2" height="2" fill="#ffd700" opacity="0.5"/>
  <rect x="44" y="42" width="2" height="2" fill="#ffd700" opacity="0.8"/>
  <rect x="40" y="46" width="2" height="2" fill="#ffd700" opacity="0.9"/>
  <rect x="44" y="46" width="2" height="2" fill="#ffd700" opacity="0.6"/>

  <!-- Far right tall building -->
  <rect x="48" y="28" width="10" height="36" fill="#2d3561"/>
  <rect x="51" y="22" width="4" height="6" fill="#2d3561"/>
  <rect x="52" y="18" width="2" height="4" fill="#4a5568"/>
  <rect x="50" y="30" width="2" height="2" fill="#ffd700" opacity="0.8"/>
  <rect x="54" y="30" width="2" height="2" fill="#ffd700" opacity="0.5"/>
  <rect x="50" y="34" width="2" height="2" fill="#ffd700" opacity="0.9"/>
  <rect x="54" y="34" width="2" height="2" fill="#ffd700" opacity="0.7"/>
  <rect x="50" y="38" width="2" height="2" fill="#ffd700" opacity="0.6"/>
  <rect x="54" y="38" width="2" height="2" fill="#ffd700" opacity="0.9"/>

  <!-- Ground/water -->
  <rect x="0" y="58" width="64" height="6" fill="#0f3460" opacity="0.8"/>
  <!-- Water reflection shimmer -->
  <rect x="4" y="60" width="8" height="1" fill="#ffd700" opacity="0.2"/>
  <rect x="28" y="60" width="8" height="1" fill="#ffd700" opacity="0.2"/>
  <rect x="50" y="60" width="8" height="1" fill="#ffd700" opacity="0.2"/>
</svg>
